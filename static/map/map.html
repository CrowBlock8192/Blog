<html>
<head>
<meta charset="utf-8">
<title>ECharts china_map</title>
<script src="./echarts3/jquery-1.10.2.min.js" type="text/javascript"></script>
<script src="./echarts3/echarts.js" type="text/javascript"></script>
<script src="./echarts3/macarons.js" type="text/javascript"></script>
<script src="./echarts3/shine.js" type="text/javascript"></script>
<script src="./echarts3/mapdata/js/china.js" type="text/javascript"></script>
<style>
    html{width:100%;height:100%;margin:0;padding:0;}
	body{width:100%;height:100%;margin:0;padding:0;}
    #echart1{width:100%;height:100%}
    #zb_select{z-index:2;width:15%;height:50%;position: absolute;}
	#zb_code{width:100%;height:100%;}
</style>
</head>
<body>
	<div id="zb_select">
		<select id="zb_code" name="zb_code">
			<option value="1">总人数</option>
			<option value="2">参保人数</option>
			<option value="3">卫生总费用（万元）</option>
		</select>
	</div>
    <div id="echart1"></div>
</body>
</html>
<script type="text/javascript">

$(function() {
  initChart()
})

function initChart() {
  var geoGpsMap = {
	    '1': [127.9688, 45.368],
	    '2': [116.4551, 40.2539],
	    '3': [109.1162, 34.2004],
	    '4': [113.12244, 23.009505],
	    '5': [87.9236, 43.5883],
	    '6': [91.11, 29.97]
  }
  var geoCoordMap = {
    '（建设兵团）乌鲁木齐': [87.727348, 43.424409],
    '乌鲁木齐': [87.527277, 43.933477],
    '乌海': [106.731405, 39.503628],
    '哈尔滨': [126.543911, 45.809627],
    '西宁': [101.785021, 36.624312],
    '庆阳': [107.642485, 35.716154],
    '西安': [108.94704, 34.349653],
    '昆明': [102.832544, 24.887321],
    '六盘水': [104.832379, 26.602452],
    '攀枝花': [101.724969, 26.589068],
    '儋州': [109.58401, 19.528235],
    '梧州': [111.280344, 23.483276],
    '佛山': [113.126784, 23.027759],
    '湘潭': [112.959663, 27.837747],
    '武汉': [114.307562, 30.600954],
    '安阳': [114.347761, 36.111538],
    '青岛': [120.390033, 36.071293],
    '上饶': [117.945439, 28.46215],
    '南平': [118.187245, 26.647255],
    '合肥': [117.229417, 31.824614],
    '金华': [119.651716, 29.084135],
    '无锡': [120.319732, 31.496347],
    '吉林': [126.570582, 43.849392],
    '沈阳': [123.465346, 41.676072],
    '临汾': [111.47321, 36.107741],
    '邯郸': [114.481239, 36.60948],
    '重庆': [106.554413, 29.570504],
    '上海': [121.474791, 31.231483],
    '天津': [117.222464, 39.114398],
    '北京': [116.401889, 39.915794]

  }
  var colors = [
	    ['#1DE9B6', '#F46E36', '#04B9FF', '#5DBD32', '#FFC809', '#FB95D5', '#BDA29A', '#6E7074', '#546570', '#C4CCD3'],
	    ['#37A2DA', '#67E0E3', '#32C5E9', '#9FE6B8', '#FFDB5C', '#FF9F7F', '#FB7293', '#E062AE', '#E690D1', '#E7BCF3', '#9D96F5', '#8378EA', '#8378EA'],
	    ['#DD6B66', '#759AA0', '#E69D87', '#8DC1A9', '#EA7E53', '#EEDD78', '#73A373', '#73B9BC', '#7289AB', '#91CA8C', '#F49F42']
  ]
  var colorIndex = 0

	    var year = ['201901', '201902', '201903', '201904', '201905']
	    var mapData = [
	        [],
	        [],
	        [],
	        [],
	        [],
	        []
	    ]
	    /* 柱子Y名称*/
	    var categoryData = []
	    var barData = []
	    for (var key in geoCoordMap) {
	        categoryData.push(key)
	        mapData[0].push({
	            'year': '2014',
	            'name': key,
	            'value': randomNum(100, 300)
	        })
	        mapData[1].push({
	            'year': '2015',
	            'name': key,
	            'value': randomNum(100, 300)
	        })
	        mapData[2].push({
	            'year': '2016',
	            'name': key,
	            'value': randomNum(100, 300)
	        })
	        mapData[3].push({
	            'year': '2017',
	            'name': key,
	            'value': randomNum(100, 300)
	        })
	        mapData[4].push({
	            'year': '2018',
	            'name': key,
	            'value': randomNum(100, 300)
	        })
	    }
	    for (var i = 0; i < mapData.length; i++) {
	        barData.push([])
	        for (var j = 0; j < mapData[i].length; j++) {
	            barData[i].push(mapData[i][j].value)
	        }
	    }

  var convertData = function(data) {
    var res = []
    for (var i = 0; i < data.length; i++) {
      var geoCoord = geoCoordMap[data[i].name]
      if (geoCoord) {
        res.push({
          name: data[i].name,
          value: geoCoord.concat(data[i].value)
        })
      }
    }
    return res
  }

  var convertToLineData = function(data, gps) {
    var res = []
    for (var i = 0; i < data.length; i++) {
      var dataItem = data[i]
      var fromCoord = geoCoordMap[dataItem.name]
      // debugger;
      var toCoord = gps // 郑州
      //  var toCoord = geoGps[Math.random()*3];
      if (fromCoord && toCoord) {
        res.push([{
          coord: fromCoord,
          value: dataItem.value
        }, {
          coord: toCoord
        }])
      }
    }
    return res
  }

  optionXyMap01 = {
    timeline: {
      data: year,
      axisType: 'category',
      autoPlay: true,
      playInterval: 3000,
      left: '10%',
      right: '10%',
      bottom: '3%',
      width: '80%',
      //  height: null,
      label: {
        normal: {
          textStyle: {
            color: '#ddd'
          }
        },
        emphasis: {
          textStyle: {
            color: '#fff'
          }
        }
      },
      symbolSize: 10,
      lineStyle: {
        color: '#555'
      },
      checkpointStyle: {
        borderColor: '#777',
        borderWidth: 2
      },
      controlStyle: {
        showNextBtn: true,
        showPrevBtn: true,
        normal: {
          color: '#666',
          borderColor: '#666'
        },
        emphasis: {
          color: '#aaa',
          borderColor: '#aaa'
        }
      }

    },
    baseOption: {
      animation: true,
      animationDuration: 1000,
      animationEasing: 'cubicInOut',
      animationDurationUpdate: 1000,
      animationEasingUpdate: 'cubicInOut',
      grid: {
        right: '1%',
        top: '15%',
        bottom: '10%',
        width: '20%'
      },
      tooltip: {
        trigger: 'axis', // hover触发器
        axisPointer: { // 坐标轴指示器，坐标轴触发有效
          type: 'shadow', // 默认为直线，可选为：'line' | 'shadow'
          shadowStyle: {
            color: 'rgba(150,150,150,0.1)' // hover颜色
          }
        }
      },
      geo: {
        show: true,
        map: 'china',
        roam: true,
        zoom: 1,
        center: [107, 36], // [113.83531246, 34.0267395887],
        label: {
          emphasis: {
            show: false
          }
        },
        itemStyle: {
          normal: {
            borderColor: 'rgba(147, 235, 248, 1)',
            borderWidth: 1,
            areaColor: {
              type: 'radial',
              x: 0.5,
              y: 0.5,
              r: 0.8,
              colorStops: [{
                offset: 0,
                color: 'rgba(147, 235, 248, 0)' // 0% 处的颜色
              }, {
                offset: 1,
                color: 'rgba(147, 235, 248, .2)' // 100% 处的颜色
              }],
              globalCoord: false // 缺省为 false
            },
            shadowColor: 'rgba(128, 217, 248, 1)',
            // shadowColor: 'rgba(255, 255, 255, 1)',
            shadowOffsetX: -2,
            shadowOffsetY: 2,
            shadowBlur: 10
          },
          emphasis: {
            areaColor: '#389BB7',
            borderWidth: 0
          }
        }
      }
    },
    options: []

  }
  for (var n = 0; n < year.length; n++) {
    optionXyMap01.options.push({
      backgroundColor: '#051b4a',
      title: [{
        /* text: '地图',
                        subtext: '内部数据请勿外传',
                        left: 'center',
                        textStyle: {
                            color: '#fff'
                        }*/
      },
      {
        id: 'statistic',
        text: year[n] + '数据统计情况',
        left: '75%',
        top: '8%',
        textStyle: {
          color: '#fff',
          fontSize: 30
        }
      }
      ],
      xAxis: {
        type: 'value',
        scale: true,
        position: 'top',
        min: 0,
        boundaryGap: false,
        splitLine: {
          show: false
        },
        axisLine: {
          show: false
        },
        axisTick: {
          show: false
        },
        axisLabel: {
          margin: 2,
          textStyle: {
            color: '#aaa'
          }
        }
      },
      yAxis: {
        type: 'category',
        //  name: 'TOP 20',
        nameGap: 16,
        axisLine: {
          show: true,
          lineStyle: {
            color: '#ddd'
          }
        },
        axisTick: {
          show: false,
          lineStyle: {
            color: '#ddd'
          }
        },
        axisLabel: {
          interval: 0,
          textStyle: {
            color: '#ddd'
          }
        },
        data: categoryData
      },
      series: [
        // 未知作用
        {
          // 文字和标志
          name: 'light',
          type: 'scatter',
          coordinateSystem: 'geo',
          data: convertData(mapData[n]),
          symbolSize: function(val) {
            return val[2] / 10
          },
          label: {
            normal: {
              formatter: '{b}',
              position: 'right',
              show: true
            },
            emphasis: {
              show: true
            }
          },
          itemStyle: {
            normal: {
              color: colors[colorIndex][n]
            }
          }
        },
        // 地图？
        {
          type: 'map',
          map: 'china',
          geoIndex: 0,
          aspectScale: 0.75, // 长宽比
          showLegendSymbol: false, // 存在legend时显示
          label: {
            normal: {
              show: false
            },
            emphasis: {
              show: false,
              textStyle: {
                color: '#fff'
              }
            }
          },
          roam: true,
          itemStyle: {
            normal: {
              areaColor: '#031525',
              borderColor: '#FFFFFF'
            },
            emphasis: {
              areaColor: '#2B91B7'
            }
          },
          animation: false,
          data: mapData
        },
        // 地图点的动画效果
        {
          //  name: 'Top 5',
          type: 'effectScatter',
          coordinateSystem: 'geo',
          data: convertData(mapData[n].sort(function(a, b) {
            return b.value - a.value
          }).slice(0, 20)),
          symbolSize: function(val) {
            return val[2] / 10
          },
          showEffectOn: 'render',
          rippleEffect: {
            brushType: 'stroke'
          },
          hoverAnimation: true,
          label: {
            normal: {
              formatter: '{b}',
              position: 'right',
              show: true
            }
          },
          itemStyle: {
            normal: {
              color: colors[colorIndex][n],
              shadowBlur: 10,
              shadowColor: colors[colorIndex][n]
            }
          },
          zlevel: 1
        },
        // 地图线的动画效果

        // 柱状图
        {
          zlevel: 1.5,
          type: 'bar',
          symbol: 'none',
          itemStyle: {
            normal: {
              color: colors[colorIndex][n]
            }
          },
          data: barData[n]
        }
      ]
    })
  }
  var myChart = echarts.init(document.getElementById('echart1'), '${ECHART_SKIN}')
  myChart.setOption(optionXyMap01)

  $(window).resize(function() {
    myChart.resize()
	   })
}

function randomNum(minNum, maxNum) {
  switch (arguments.length) {
    case 1:
      return parseInt(Math.random() * minNum + 1, 10)
      break
    case 2:
      return parseInt(Math.random() * (maxNum - minNum + 1) + minNum, 10)
      break
    default:
      return 0
      break
  }
}
</script>
